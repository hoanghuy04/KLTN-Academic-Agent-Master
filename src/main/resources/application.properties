spring.application.name=${SPRING_APPLICATION_NAME}
server.port=${SERVER_PORT}
server.servlet.context-path=/api
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
file.upload-dir=D:/Bondhub/Bondhub_Assitant/backend/Assistant

DEFAULT_SUPERADMIN_PASS=${DEFAULT_SUPERADMIN_PASS}
DEFAULT_INGESTADMIN_PASS=${DEFAULT_INGESTADMIN_PASS}
DEFAULT_USER_PASS=${DEFAULT_USER_PASS}

jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION}
jwt.secret=${JWT_SECRET}

spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.size-parameter=limit
spring.data.web.pageable.page-parameter=page

